name: Sync transcripts

on:
  schedule:
    # Every 30 minutes, 8am-7pm US Eastern (12:00-23:30 UTC), Mon-Fri.
    # Adjust to your working hours; GitHub cron is UTC and best-effort.
    - cron: "*/30 12-23 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: notesync-sync
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Trigger Power Automate flow
        run: npm run trigger
        env:
          FLOW_URL: ${{ secrets.FLOW_URL }}
          FLOW_SECRET: ${{ secrets.FLOW_SECRET }}
